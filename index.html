<!DOCTYPE html>
<html>
<head>
<title>Emotion Detector</title>
</head>

<body>

<h2>Emotion Detector</h2>

<input id="textToAnalyze" type="text" placeholder="Enter text">

<button onclick="RunSentimentAnalysis()">Analyze Emotion</button>

<p id="system_response"></p>

<script>

function RunSentimentAnalysis(){

    let text = document.getElementById("textToAnalyze").value

    fetch("/emotionDetector?textToAnalyze=" + text)

    .then(response => response.text())

    .then(data => {
        document.getElementById("system_response").innerHTML = data
    })

}

</script>

</body>

</html>
